<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAS Dépannage — Service de Remorquage Premium | Lyon 7ème</title>
<meta name="description" content="SAS Dépannage, votre expert en remorquage et dépannage automobile à Lyon. Disponible 24h/24, 7j/7. Intervention rapide sur Lyon et région.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400;1,600;1,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* =============================================
   CSS VARIABLES & RESET
   ============================================= */
:root {
  --bg-primary: #08111f;
  --bg-secondary: #0d1a2e;
  --bg-card: #0f1f35;
  --bg-card-hover: #132540;
  --gold: #c9963a;
  --gold-light: #e0b060;
  --gold-dark: #a07828;
  --gold-subtle: rgba(201, 150, 58, 0.12);
  --text-primary: #f0e8d8;
  --text-secondary: #9aafc7;
  --text-muted: #5a6e87;
  --red-banner: #991b1b;
  --red-hover: #7f1d1d;
  --border-subtle: rgba(201, 150, 58, 0.2);
  --border-card: rgba(201, 150, 58, 0.08);
  --font-serif: 'Playfair Display', Georgia, serif;
  --font-sans: 'DM Sans', system-ui, sans-serif;
  --shadow-gold: 0 0 30px rgba(201, 150, 58, 0.15);
  --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.4);
  --radius: 4px;
  --radius-lg: 8px;
  --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-weight: 400;
  line-height: 1.65;
  overflow-x: hidden;
}

img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
ul { list-style: none; }

/* =============================================
   TIMER BANNER (STICKY)
   ============================================= */
#timer-banner {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--red-banner);
  color: #fff;
  text-align: center;
  padding: 10px 20px;
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.03em;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

#timer-banner strong {
  font-weight: 600;
  color: #fecaca;
}

#timer-display {
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px;
  padding: 2px 10px;
  font-family: 'Courier New', monospace;
  font-size: 0.9rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.1em;
}

/* =============================================
   NAVIGATION
   ============================================= */
#navbar {
  position: sticky;
  top: 41px;
  z-index: 999;
  background: rgba(8, 17, 31, 0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
  padding: 0 5%;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: var(--transition);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-logo-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.nav-logo-name {
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 1rem;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}

.nav-logo-sub {
  font-size: 0.65rem;
  color: var(--gold);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 500;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
}

.nav-links a {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: color var(--transition);
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--gold);
  transition: width var(--transition);
}

.nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { width: 100%; }

.btn-call {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: var(--bg-primary);
  font-family: var(--font-sans);
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 10px 20px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-call:hover {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(201, 150, 58, 0.35);
}

/* =============================================
   HERO SECTION
   ============================================= */
#hero {
  min-height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  overflow: hidden;
  background: var(--bg-primary);
}

/* Background decorative elements */
.hero-bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201, 150, 58, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201, 150, 58, 0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.hero-bg-gradient {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 60% at 60% 50%, rgba(201, 150, 58, 0.06) 0%, transparent 70%),
              radial-gradient(ellipse 40% 40% at 10% 80%, rgba(13, 26, 46, 0.9) 0%, transparent 60%);
  pointer-events: none;
}

.hero-bg-circle {
  position: absolute;
  right: -10%;
  top: 50%;
  transform: translateY(-50%);
  width: min(600px, 70vw);
  height: min(600px, 70vw);
  border-radius: 50%;
  border: 1px solid var(--border-subtle);
  pointer-events: none;
  animation: rotateSlow 40s linear infinite;
}

.hero-bg-circle::before {
  content: '';
  position: absolute;
  inset: 20px;
  border-radius: 50%;
  border: 1px solid rgba(201, 150, 58, 0.06);
}

.hero-bg-circle::after {
  content: '';
  position: absolute;
  inset: 50px;
  border-radius: 50%;
  border: 1px dashed rgba(201, 150, 58, 0.08);
}

@keyframes rotateSlow {
  from { transform: translateY(-50%) rotate(0deg); }
  to { transform: translateY(-50%) rotate(360deg); }
}

.hero-content {
  position: relative;
  z-index: 2;
  padding: 120px 5% 80px;
  max-width: 760px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--border-subtle);
  border-radius: 30px;
  padding: 6px 16px;
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
  margin-bottom: 28px;
  background: var(--gold-subtle);
}

.hero-badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.hero-title {
  font-family: var(--font-serif);
  font-size: clamp(2.8rem, 6vw, 5.2rem);
  font-weight: 900;
  line-height: 1.08;
  margin-bottom: 24px;
  color: var(--text-primary);
}

.hero-title .italic-gold {
  font-style: italic;
  color: var(--gold);
  display: block;
}

.hero-subtitle {
  font-size: clamp(0.95rem, 1.8vw, 1.1rem);
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 560px;
  margin-bottom: 40px;
  font-weight: 300;
}

.hero-cta-group {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 56px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  color: var(--bg-primary);
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 15px 28px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  transition: all var(--transition);
}

.btn-primary:hover {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  transform: translateY(-2px);
  box-shadow: 0 10px 35px rgba(201, 150, 58, 0.4);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 14px 28px;
  border-radius: var(--radius);
  border: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: all var(--transition);
}

.btn-secondary:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: var(--gold-subtle);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
}

.stat-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-number {
  font-family: var(--font-serif);
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}

.stat-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
}

.stat-divider {
  width: 1px;
  height: 48px;
  background: var(--border-subtle);
  align-self: center;
}

/* =============================================
   TRUST RIBBON
   ============================================= */
#trust-ribbon {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-subtle);
  border-bottom: 1px solid var(--border-subtle);
  padding: 22px 5%;
}

.trust-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.trust-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}

.trust-check {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--gold-subtle);
  border: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: var(--gold);
  flex-shrink: 0;
}

/* =============================================
   MARQUEE
   ============================================= */
#marquee-section {
  overflow: hidden;
  padding: 18px 0;
  background: var(--bg-primary);
  border-bottom: 1px solid var(--border-card);
  position: relative;
}

#marquee-section::before,
#marquee-section::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 120px;
  z-index: 2;
  pointer-events: none;
}

#marquee-section::before {
  left: 0;
  background: linear-gradient(90deg, var(--bg-primary), transparent);
}

#marquee-section::after {
  right: 0;
  background: linear-gradient(-90deg, var(--bg-primary), transparent);
}

.marquee-track {
  display: flex;
  gap: 0;
  animation: marqueeScroll 28s linear infinite;
  width: max-content;
}

.marquee-track:hover {
  animation-play-state: paused;
}

.marquee-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 40px;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
}

.marquee-item span {
  font-size: 1rem;
}

.marquee-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.6;
}

@keyframes marqueeScroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* =============================================
   SERVICES SECTION
   ============================================= */
#services {
  padding: 100px 5%;
  background: var(--bg-primary);
}

.section-header {
  text-align: center;
  margin-bottom: 64px;
}

.section-label {
  display: inline-block;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 16px;
  position: relative;
  padding: 0 24px;
}

.section-label::before,
.section-label::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 40px;
  height: 1px;
  background: var(--gold);
  opacity: 0.5;
}

.section-label::before { right: 100%; margin-right: -24px; }
.section-label::after { left: 100%; margin-left: -24px; }

.section-title {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1.15;
  margin-bottom: 20px;
}

.section-title em {
  font-style: italic;
  color: var(--gold);
}

.section-desc {
  font-size: 1rem;
  color: var(--text-secondary);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.7;
  font-weight: 300;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
  gap: 2px;
  background: var(--border-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.service-card {
  background: var(--bg-card);
  padding: 40px 32px;
  position: relative;
  transition: all var(--transition);
  cursor: default;
  overflow: hidden;
}

.service-card::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
  transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}

.service-card:hover {
  background: var(--bg-card-hover);
  transform: translateY(-3px);
  box-shadow: var(--shadow-card);
}

.service-card:hover::before {
  width: 100%;
}

.service-number {
  font-family: var(--font-serif);
  font-size: 3.5rem;
  font-weight: 900;
  color: rgba(201, 150, 58, 0.12);
  line-height: 1;
  margin-bottom: 20px;
  transition: color var(--transition);
}

.service-card:hover .service-number {
  color: rgba(201, 150, 58, 0.22);
}

.service-icon {
  font-size: 1.8rem;
  margin-bottom: 16px;
  display: block;
}

.service-name {
  font-family: var(--font-serif);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
  line-height: 1.3;
}

.service-desc {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.7;
  font-weight: 300;
}

.service-tag {
  display: inline-block;
  margin-top: 20px;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  padding: 4px 10px;
  border: 1px solid var(--border-subtle);
  border-radius: 20px;
  background: var(--gold-subtle);
}

/* =============================================
   TESTIMONIALS
   ============================================= */
#testimonials {
  padding: 100px 5%;
  background: var(--bg-secondary);
  position: relative;
  overflow: hidden;
}

#testimonials::before {
  content: '"';
  position: absolute;
  top: -20px;
  left: 4%;
  font-family: var(--font-serif);
  font-size: 20rem;
  color: rgba(201, 150, 58, 0.04);
  line-height: 1;
  pointer-events: none;
  font-style: italic;
}

.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.testimonial-card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  padding: 36px 28px;
  position: relative;
  transition: all var(--transition);
}

.testimonial-card:hover {
  border-color: var(--border-subtle);
  box-shadow: var(--shadow-gold);
  transform: translateY(-4px);
}

.testimonial-stars {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
}

.star {
  color: var(--gold);
  font-size: 0.85rem;
}

.testimonial-quote {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.75;
  font-style: italic;
  margin-bottom: 28px;
  font-weight: 300;
}

.testimonial-author {
  display: flex;
  align-items: center;
  gap: 14px;
}

.author-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-serif);
  font-size: 1rem;
  font-weight: 700;
  color: var(--bg-primary);
  flex-shrink: 0;
}

.author-info {
  display: flex;
  flex-direction: column;
}

.author-name {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.2;
}

.author-date {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* =============================================
   CTA FINAL
   ============================================= */
#cta-section {
  padding: 100px 5%;
  background: var(--bg-primary);
  position: relative;
  overflow: hidden;
}

.cta-bg-decor {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 50% 60% at 50% 100%, rgba(201, 150, 58, 0.05) 0%, transparent 70%);
  pointer-events: none;
}

.cta-inner {
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
  position: relative;
}

.cta-title {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 4.5vw, 3.4rem);
  font-weight: 900;
  color: var(--text-primary);
  line-height: 1.1;
  margin-bottom: 20px;
}

.cta-title em {
  font-style: italic;
  color: var(--gold);
}

.cta-subtitle {
  font-size: 1rem;
  color: var(--text-secondary);
  margin-bottom: 52px;
  font-weight: 300;
  line-height: 1.7;
}

.price-box-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 2px;
  background: var(--border-card);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 48px;
}

.price-box {
  background: var(--bg-card);
  padding: 36px 24px;
  text-align: center;
  transition: all var(--transition);
  position: relative;
}

.price-box.featured {
  background: linear-gradient(160deg, rgba(201, 150, 58, 0.1), rgba(201, 150, 58, 0.05));
  border-top: 2px solid var(--gold);
}

.price-box:hover {
  background: var(--bg-card-hover);
}

.price-box-label {
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
  font-weight: 600;
}

.price-box-title {
  font-family: var(--font-serif);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.price-box-icon {
  font-size: 2rem;
  display: block;
  margin-bottom: 12px;
}

.price-box-desc {
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.6;
  font-weight: 300;
}

.featured-badge {
  display: inline-block;
  background: var(--gold);
  color: var(--bg-primary);
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 2px;
  margin-bottom: 10px;
}

.cta-phone-display {
  margin-bottom: 16px;
}

.phone-number-big {
  font-family: var(--font-serif);
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.03em;
  display: block;
  transition: color var(--transition);
}

.phone-number-big:hover {
  color: var(--gold-light);
}

.cta-note {
  font-size: 0.75rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}

.cta-buttons {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 32px;
}

/* =============================================
   FOOTER
   ============================================= */
#footer {
  background: #050d18;
  border-top: 1px solid var(--border-subtle);
  padding: 56px 5% 32px;
}

.footer-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr;
  gap: 48px;
  margin-bottom: 48px;
}

.footer-brand .nav-logo {
  margin-bottom: 20px;
}

.footer-tagline {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.7;
  font-weight: 300;
  max-width: 260px;
}
